name: Security Pipeline
#besmelleh
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      full_scan:
        description: 'Full cluster scan'
        required: false
        default: 'false'

jobs:
  scan:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Kubescape
        run: |
          curl -s https://raw.githubusercontent.com/kubescape/kubescape/master/install.sh | /bin/bash
      
      - name: Run scan
        run: |
          kubescape scan \
            --format json \
            --output results.json \
            ${{ inputs.full_scan == 'true' && '--include-namespaces=*' || '' }}
      
      - name: Process results
        run: |
          pip install -r .github/scripts/security/requirements.txt
          python .github/scripts/security/process_kubescape.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            results.json
            security_issues.json
