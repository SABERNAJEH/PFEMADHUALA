name: 🔍 Analyse de Sécurité

on:
  workflow_call:
    secrets:
      EMAIL_FROM:
        required: true
      EMAIL_PWD:
        required: true
      REPORT_TO:
        required: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    env:
      REPORT_DIR: "$GITHUB_WORKSPACE/.github/reports"
    
    steps:
      - uses: actions/checkout@v3

      - name: Configurer l'environnement
        run: |
          mkdir -p "$REPORT_DIR"
          chmod +x "$GITHUB_WORKSPACE"/.github/scripts/scanning/*.sh

      - name: Installer Kubescape (Solution Garantie)
        run: |
          # 1. Téléchargement direct du binaire (alternative au script d'installation)
          KUBESCAPE_VERSION="v2.4.2"
          sudo curl -Lo /usr/local/bin/kubescape \
            "https://github.com/kubescape/kubescape/releases/download/${KUBESCAPE_VERSION}/kubescape-ubuntu-latest"
          
          # 2. Rendre le binaire exécutable
          sudo chmod +x /usr/local/bin/kubescape
          
          # 3. Vérification
          kubescape version
          echo "Chemin d'installation : $(which kubescape)"

      - name: Lancer le scan Kubescape
        run: |
          kubescape scan --submit --enable-host-scan \
            --format json \
            --output "$REPORT_DIR/kubescape-scan.json" \
            --exclude-namespaces kube-system,kube-public \
            --verbose

      - name: Installer Trivy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Lancer le scan Trivy
        run: |
          trivy k8s --all-namespaces \
            --format json \
            --output "$REPORT_DIR/trivy-scan.json" \
            --timeout 10m

      - name: Envoyer le rapport consolidé
        env:
          GMAIL_USER: ${{ secrets.EMAIL_FROM }}
          GMAIL_PASSWORD: ${{ secrets.EMAIL_PWD }}
          REPORT_EMAIL: ${{ secrets.REPORT_TO }}
        run: |
          python "$GITHUB_WORKSPACE/.github/scripts/scanning/send-report.py"
