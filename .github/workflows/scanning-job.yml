name: 🔍 Analyse de Sécurité

on:
  workflow_call:
    secrets:
      EMAIL_FROM:
        required: true
      EMAIL_PWD:
        required: true
      REPORT_TO:
        required: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    env:
      REPORT_DIR: "$GITHUB_WORKSPACE/.github/reports"
    
    steps:
      - uses: actions/checkout@v3

      - name: Configurer l'environnement
        run: |
          mkdir -p "$REPORT_DIR"
          chmod +x "$GITHUB_WORKSPACE"/.github/scripts/scanning/*.sh

      - name: Installer Kubescape (Méthode Garantie)
        run: |
          # 1. Téléchargement avec vérification SSL désactivée (pour les problèmes de certificat)
          wget --no-check-certificate -q https://github.com/kubescape/kubescape/releases/download/v2.4.2/kubescape-ubuntu-latest -O kubescape
          
          # 2. Installation avec vérifications renforcées
          sudo install -o root -g root -m 0755 kubescape /usr/local/bin/kubescape
          
          # 3. Vérification absolue
          if ! /usr/local/bin/kubescape version; then
            echo "::error::Échec critique : Kubescape ne s'exécute pas"
            exit 1
          fi
          echo "Kubescape installé avec succès à $(which kubescape)"

      - name: Lancer le scan Kubescape
        run: |
          kubescape scan --submit --enable-host-scan \
            --format json \
            --output "$REPORT_DIR/kubescape-scan.json" \
            --exclude-namespaces kube-system,kube-public \
            --verbose

      - name: Installer Trivy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Lancer le scan Trivy
        run: |
          trivy k8s --all-namespaces \
            --format json \
            --output "$REPORT_DIR/trivy-scan.json" \
            --timeout 10m

      - name: Envoyer le rapport consolidé
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          REPORT_EMAIL: ${{ secrets.REPORT_TO }}
        run: |
          python "$GITHUB_WORKSPACE/.github/scripts/scanning/send-report.py"
