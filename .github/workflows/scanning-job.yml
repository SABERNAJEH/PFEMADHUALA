name: 🔍 Analyse de Sécurité

on:
  workflow_call:
    secrets:
      EMAIL_FROM:
        required: true
      EMAIL_PWD:
        required: true
      REPORT_TO:
        required: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    env:
      REPORT_DIR: "$GITHUB_WORKSPACE/.github/reports"
    
    steps:
      - uses: actions/checkout@v3

      - name: Configurer l'environnement
        run: |
          mkdir -p "$REPORT_DIR"
          chmod +x "$GITHUB_WORKSPACE"/.github/scripts/scanning/*.sh

      - name: Installer Kubescape (Méthode Officielle)
        run: |
          # 1. Installer la dépendance requise
          sudo apt-get update && sudo apt-get install -y curl
          
          # 2. Téléchargement via le script officiel avec paramètre -b
          curl -s https://raw.githubusercontent.com/kubescape/kubescape/master/install.sh | bash -s -- -b /usr/local/bin
          
          # 3. Vérification
          echo "Chemin de kubescape: $(which kubescape)"
          kubescape version

      - name: Lancer le scan Kubescape
        run: |
          kubescape scan --submit --enable-host-scan \
            --format json \
            --output "$REPORT_DIR/kubescape-scan.json" \
            --exclude-namespaces kube-system,kube-public \
            --verbose

      - name: Installer Trivy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Lancer le scan Trivy
        run: |
          trivy k8s --all-namespaces \
            --format json \
            --output "$REPORT_DIR/trivy-scan.json" \
            --timeout 10m

      - name: Envoyer le rapport consolidé
        env:
          GMAIL_USER: ${{ secrets.EMAIL_FROM }}
          GMAIL_PASSWORD: ${{ secrets.EMAIL_PWD }}
          REPORT_EMAIL: ${{ secrets.REPORT_TO }}
        run: |
          python "$GITHUB_WORKSPACE/.github/scripts/scanning/send-report.py"
