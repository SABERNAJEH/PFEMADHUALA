name: 🔍 Analyse de Sécurité

on:
  workflow_call:
    secrets:
      EMAIL_TO:
        required: true
      EMAIL_FROM:
        required: true
      EMAIL_PWD:
        required: true
      REPORT_TO:
        required: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup environment
        run: |
          mkdir -p .github/reports
          echo "$HOME/.kubescape/bin" >> $GITHUB_PATH

      - name: Install Kubescape
        run: |
          curl -s https://raw.githubusercontent.com/kubescape/kubescape/master/install.sh | bash
          kubescape version
          echo "Version installée: $(kubescape version)"

      - name: Find and verify Kubernetes manifests
        id: find-manifests
        run: |
          # Trouver tous les fichiers YAML/yml sauf les résultats précédents
          MANIFESTS=$(find . -name '*.yaml' -o -name '*.yml' | grep -v 'scan-results' | tr '\n' ' ')
          
          if [ -z "$MANIFESTS" ]; then
            echo "::error::Aucun manifest Kubernetes trouvé!"
            echo "Liste des fichiers trouvés:"
            find . -type f | head -20
            exit 1
          fi
          
          echo "Fichiers à analyser:"
          echo "$MANIFESTS" | tr ' ' '\n'
          echo "MANIFESTS=${MANIFESTS}" >> $GITHUB_OUTPUT

      - name: Run Kubescape scan with debug
        run: |
          echo "Exécution du scan sur: ${{ steps.find-manifests.outputs.MANIFESTS }}"
          
          # Exécuter avec debug et capture complète de la sortie
          kubescape scan ${{ steps.find-manifests.outputs.MANIFESTS }} \
            --format json \
            --output .github/reports/scan-results.json \
            2>&1 | tee scan-debug.log
          
          # Vérifier le contenu du rapport
          echo "Contenu du rapport:"
          cat .github/reports/scan-results.json
          
          if [ ! -s ".github/reports/scan-results.json" ]; then
            echo "::error::Le rapport est vide!"
            echo "Logs de debug:"
            cat scan-debug.log
            exit 1
          fi

      - name: Validate and save report
        run: |
          # Valider que le JSON est valide
          jq empty .github/reports/scan-results.json
          
          # Sauvegarder avec timestamp
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          cp .github/reports/scan-results.json .github/reports/scan-results-$TIMESTAMP.json
          echo "Rapport sauvegardé sous: scan-results-$TIMESTAMP.json"
      #debut modif
      - name: Process results
        run: |
          jq '.summaryDetails | {riskScore: .totalRiskScore, failedControls: .failedControls}' \
            .github/reports/scan-results.json > .github/reports/metrics.json

      - name: Push metrics to Prometheus
        run: |
          python3 <<EOF
          from prometheus_client import CollectorRegistry, Gauge, push_to_gateway
          import json, os

          registry = CollectorRegistry()
          g = Gauge('kubescape_risk_score', 'Security risk score', registry=registry)
          
          with open('.github/reports/metrics.json') as f:
              data = json.load(f)
          
          g.set(data['riskScore'])
          push_to_gateway('${PROMETHEUS_URL}', job='kubescape', registry=registry)
          EOF

      - name: Update Grafana dashboard
        env:
          GRAFANA_API_KEY: ${{ secrets.GRAFANA_API_KEY }}
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${GRAFANA_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @.github/reports/metrics.json \
            "${GRAFANA_URL}/api/dashboards/db"

      - name: Expose Grafana URL
        run: |
          echo "::notice::Dashboard Grafana disponible à l'adresse: ${{ steps.scan.outputs.GRAFANA_URL }}"
          echo "GRAFANA_DASHBOARD_URL=${{ steps.scan.outputs.GRAFANA_URL }}" >> $GITHUB_ENV

      - name: Send notification
        env:
          GRAFANA_DASHBOARD_URL: ${{ env.GRAFANA_DASHBOARD_URL }}
        run: |
          python3 <<EOF
          import smtplib, os
          from email.mime.text import MIMEText

          msg = MIMEText(f"Rapport de sécurité disponible:\n{os.environ['GRAFANA_DASHBOARD_URL']}")
          msg['Subject'] = 'Rapport de sécurité Kubescape'
          msg['From'] = os.environ['EMAIL_FROM']
          msg['To'] = os.environ['EMAIL_TO']

          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as server:
              server.login(os.environ['EMAIL_FROM'], os.environ['EMAIL_PWD'])
              server.send_message(msg)
          EOF
          #fin modif
      - name: Send report
        env:
          GMAIL_USER: ${{ secrets.EMAIL_FROM }}
          GMAIL_PASSWORD: ${{ secrets.EMAIL_PWD }}
          REPORT_EMAIL: ${{ secrets.REPORT_TO }}
        run: |
          echo "Envoi du rapport..."
          python .github/scripts/scanning/send-report.py
