name: 🔍 Analyse de Sécurité

on:
  workflow_call:
    secrets:
      EMAIL_FROM:
        required: true
      EMAIL_PWD:
        required: true
      REPORT_TO:
        required: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    env:
      REPORT_DIR: "$GITHUB_WORKSPACE/.github/reports"
    
    steps:
      - uses: actions/checkout@v3

      - name: Configurer l'environnement
        run: |
          mkdir -p "$REPORT_DIR"
          chmod +x "$GITHUB_WORKSPACE"/.github/scripts/scanning/*.sh

      - name: Installer Kubescape (Solution Ultime)
        run: |
          # 1. Téléchargement via GitHub API (méthode infaillible)
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/kubescape/kubescape/releases/latest | grep "browser_download_url.*ubuntu-latest" | cut -d '"' -f 4)
          wget --no-verbose "$DOWNLOAD_URL" -O kubescape
          
          # 2. Installation avec vérification d'intégrité
          sudo install -v -o root -g root -m 0755 kubescape /usr/local/bin/
          rm kubescape
          
          # 3. Vérification finale
          if ! kubescape version; then
            echo "::error::ÉCHEC CRITIQUE : Installation de Kubescape a échoué"
            exit 1
          fi
          echo "✅ Kubescape installé avec succès (version: $(kubescape version))"

      - name: Lancer le scan Kubescape
        run: |
          kubescape scan --submit --enable-host-scan \
            --format json \
            --output "$REPORT_DIR/kubescape-scan.json" \
            --exclude-namespaces kube-system,kube-public \
            --verbose

      - name: Installer Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.45.0

      - name: Lancer le scan Trivy
        run: |
          trivy k8s --all-namespaces \
            --format json \
            --output "$REPORT_DIR/trivy-scan.json" \
            --timeout 15m

      - name: Envoyer le rapport
        env:
          GMAIL_USER: ${{ secrets.EMAIL_FROM }}
          GMAIL_PASSWORD: ${{ secrets.EMAIL_PWD }}
          REPORT_EMAIL: ${{ secrets.REPORT_TO }}
        run: |
          python "$GITHUB_WORKSPACE/.github/scripts/scanning/send-report.py"
