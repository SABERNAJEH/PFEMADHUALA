name: 🔍 Analyse de Sécurité Kubernetes

on:
  workflow_call:
    secrets:
      EMAIL_FROM:
        required: true
      EMAIL_PWD:
        required: true
      REPORT_TO:
        required: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    env:
      REPORT_DIR: "$GITHUB_WORKSPACE/.github/reports"
    
    steps:
      - uses: actions/checkout@v3

      - name: Configurer l'environnement
        run: |
          mkdir -p "$REPORT_DIR"
          chmod +x "$GITHUB_WORKSPACE"/.github/scripts/scanning/*.sh

      - name: Installer Kubescape (Méthode robuste)
        run: |
          curl -s https://raw.githubusercontent.com/kubescape/kubescape/master/install.sh | /bin/bash
          echo "$HOME/.kubescape/bin" >> $GITHUB_PATH
          $HOME/.kubescape/bin/kubescape version

      - name: Lancer le scan Kubescape
        run: |
          kubescape scan framework nsa,mitre \
            --submit \
            --format json \
            --output "$REPORT_DIR/kubescape-scan.json" \
            --exclude-namespaces kube-system,kube-public \
            --verbose

      - name: Installer Trivy (avec checksum de vérification)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | \
            sh -s -- -b /usr/local/bin v0.50.0  # Version explicite pour éviter les surprises

      - name: Lancer le scan Trivy
        run: |
          trivy k8s --all-namespaces \
            --format json \
            --output "$REPORT_DIR/trivy-scan.json" \
            --timeout 15m \
            --security-checks vuln,config,secret

      - name: Envoyer le rapport
        env:
          GMAIL_USER: ${{ secrets.EMAIL_FROM }}
          GMAIL_PASSWORD: ${{ secrets.EMAIL_PWD }}
          REPORT_EMAIL: ${{ secrets.REPORT_TO }}
        run: |
          python "$GITHUB_WORKSPACE/.github/scripts/scanning/send-report.py"
