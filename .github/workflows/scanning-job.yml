name: 🔍 Scan de Sécurité

on:
  workflow_call:
    secrets:
      EMAIL_FROM:
        required: true
      EMAIL_PWD:
        required: true
      REPORT_TO:
        required: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    env:
      REPORT_DIR: "$GITHUB_WORKSPACE/.github/reports"
    
    steps:
      - uses: actions/checkout@v3

      - name: Installer Kubescape (Méthode Certifiée)
        run: |
          # 1. Télécharger le binaire statique (compatible avec tous les Linux)
          wget -q https://github.com/kubescape/kubescape/releases/latest/download/kubescape-linux-amd64 -O kubescape
          
          # 2. Installer dans un chemin système
          chmod +x kubescape
          sudo mv kubescape /usr/local/bin/
          
          # 3. Vérification imparable
          /usr/local/bin/kubescape version || (echo "Échec critique : l'installation a échoué" && exit 1)
          echo "Kubescape installé avec succès à $(which kubescape)"

      - name: Lancer le scan Kubescape
        run: |
          kubescape scan --submit --enable-host-scan \
            --format json \
            --output "$REPORT_DIR/kubescape-scan.json" \
            --exclude-namespaces kube-system,kube-public

      - name: Installer Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Lancer le scan Trivy
        run: |
          trivy k8s --all-namespaces \
            --format json \
            --output "$REPORT_DIR/trivy-scan.json" \
            --timeout 15m

      - name: Envoyer le rapport
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          REPORT_EMAIL: ${{ secrets.REPORT_TO }}
        run: |
          python "$GITHUB_WORKSPACE/.github/scripts/scanning/send-report.py"
