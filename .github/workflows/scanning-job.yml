name: 🔍 Analyse de Sécurité

on:
  workflow_call:
    secrets:
      EMAIL_FROM:
        required: true
      EMAIL_PWD:
        required: true
      REPORT_TO:
        required: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    env:
      REPORT_DIR: "$GITHUB_WORKSPACE/.github/reports"
    
    steps:
      - uses: actions/checkout@v3

      - name: Configurer l'environnement
        run: |
          mkdir -p "$REPORT_DIR"
          chmod +x "$GITHUB_WORKSPACE"/.github/scripts/scanning/*.sh

      - name: Installer Kubescape (Méthode 100% Fiable)
        run: |
          # 1. Téléchargement direct du binaire AMD64 (pour les runners GitHub)
          wget -q https://github.com/kubescape/kubescape/releases/latest/download/kubescape -O kubescape
          
          # 2. Vérification du fichier téléchargé
          if [ ! -f kubescape ]; then
            echo "::error::Échec du téléchargement"
            exit 1
          fi
          
          # 3. Installation
          chmod +x kubescape
          sudo mv kubescape /usr/local/bin/
          
          # 4. Vérification finale
          if ! kubescape version; then
            echo "::error::Échec de l'exécution"
            exit 1
          fi
          echo "✅ Kubescape $(kubescape version) installé avec succès"

      - name: Lancer le scan Kubescape
        run: |
          kubescape scan --submit --enable-host-scan \
            --format json \
            --output "$REPORT_DIR/kubescape-scan.json" \
            --exclude-namespaces kube-system,kube-public \
            --verbose

      - name: Installer Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Lancer le scan Trivy
        run: |
          trivy k8s --all-namespaces \
            --format json \
            --output "$REPORT_DIR/trivy-scan.json" \
            --timeout 15m

      - name: Envoyer le rapport
        env:
          GMAIL_USER: ${{ secrets.EMAIL_FROM }}
          GMAIL_PASSWORD: ${{ secrets.EMAIL_PWD }}
          REPORT_EMAIL: ${{ secrets.REPORT_TO }}
        run: |
          python "$GITHUB_WORKSPACE/.github/scripts/scanning/send-report.py"
