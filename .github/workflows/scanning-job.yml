name: 🔍 Analyse de Sécurité Kubernetes Complète

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  REPORT_DIR: "$GITHUB_WORKSPACE/.github/reports"
  KUBESCAPE_REPORT: "$GITHUB_WORKSPACE/.github/reports/kubescape-scan.json"
  TRIVY_REPORT: "$GITHUB_WORKSPACE/.github/reports/trivy-scan.json"

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Configurer l'environnement
        run: |
          mkdir -p "$REPORT_DIR"
          sudo apt-get update
          sudo apt-get install -y jq curl python3-pip
          pip install pyyaml

      - name: Configurer l'accès Kubernetes
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      - name: Exécuter Kubescape
        run: |
          curl -s https://raw.githubusercontent.com/kubescape/kubescape/master/install.sh | /bin/bash
          
          # Toujours générer un fichier de sortie valide
          $HOME/.kubescape/bin/kubescape scan framework nsa,mitre \
            --format json \
            --output "$KUBESCAPE_REPORT" \
            || echo '{"status":"completed", "summary":{"passed":0,"failed":0},"message":"Scan failed"}' > "$KUBESCAPE_REPORT"
          
          # Vérifier et formater le JSON
          jq '.' "$KUBESCAPE_REPORT" > temp.json && mv temp.json "$KUBESCAPE_REPORT" || true

      - name: Exécuter Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          
          # Toujours générer un fichier de sortie valide
          trivy k8s --report summary all \
            --format json \
            --output "$TRIVY_REPORT" \
            --scanners vuln,misconfig,secret \
            --timeout 20m \
            || echo '{"status":"completed", "Results":[],"message":"Scan failed"}' > "$TRIVY_REPORT"
          
          # Vérifier et formater le JSON
          jq '.' "$TRIVY_REPORT" > temp.json && mv temp.json "$TRIVY_REPORT" || true

      - name: Vérifier les rapports
        run: |
          echo "=== Fichiers générés ==="
          ls -la "$REPORT_DIR"
          echo "=== Taille des rapports ==="
          wc -c "$KUBESCAPE_REPORT" "$TRIVY_REPORT"

      - name: Envoyer le rapport par email
        env:
          GMAIL_USER: ${{ secrets.EMAIL_FROM }}
          GMAIL_PASSWORD: ${{ secrets.EMAIL_PWD }}
          REPORT_EMAIL: ${{ secrets.REPORT_TO }}
          KUBESCAPE_REPORT_PATH: "${{ env.KUBESCAPE_REPORT }}"
          TRIVY_REPORT_PATH: "${{ env.TRIVY_REPORT }}"
        run: |
          python3 "$GITHUB_WORKSPACE/.github/scripts/send_report.py"
