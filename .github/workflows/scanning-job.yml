name: 🔍 Analyse de Sécurité Kubernetes

on:
  workflow_call:
    secrets:
      EMAIL_FROM:
        required: true
      EMAIL_PWD:
        required: true
      REPORT_TO:
        required: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    env:
      REPORT_DIR: "$GITHUB_WORKSPACE/.github/reports"
    
    steps:
      - uses: actions/checkout@v3

      - name: Configurer l'environnement
        run: |
          mkdir -p "$REPORT_DIR"
          chmod +x "$GITHUB_WORKSPACE"/.github/scripts/scanning/*.sh

      - name: Installer Kubescape (Méthode robuste)
        run: |
          # 1. Utilisation de l'URL canonique et vérification HTTPS
          KUBESCAPE_URL="https://github.com/kubescape/kubescape/releases/latest/download/kubescape-linux-amd64"
          
          # 2. Téléchargement avec vérification du code HTTP
          if ! curl -sSLf "$KUBESCAPE_URL" -o kubescape; then
            echo "::error::Échec du téléchargement (URL: $KUBESCAPE_URL)"
            exit 1
          fi
          
          # 3. Vérification du binaire (non vide + executable)
          if [ ! -s kubescape ]; then
            echo "::error::Fichier binaire vide ou corrompu"
            exit 1
          fi
          
          chmod +x kubescape
          sudo mv kubescape /usr/local/bin/
          
          # 4. Vérification de la version
          if ! kubescape version; then
            echo "::error::Échec de l'exécution (vérifiez l'architecture du runner)"
            exit 1
          fi
          echo "✅ Kubescape $(kubescape version) installé avec succès"

      - name: Lancer le scan Kubescape
        run: |
          kubescape scan framework nsa,mitre \
            --submit \
            --format json \
            --output "$REPORT_DIR/kubescape-scan.json" \
            --exclude-namespaces kube-system,kube-public \
            --verbose

      - name: Installer Trivy (avec checksum de vérification)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | \
            sh -s -- -b /usr/local/bin v0.50.0  # Version explicite pour éviter les surprises

      - name: Lancer le scan Trivy
        run: |
          trivy k8s --all-namespaces \
            --format json \
            --output "$REPORT_DIR/trivy-scan.json" \
            --timeout 15m \
            --security-checks vuln,config,secret

      - name: Envoyer le rapport
        env:
          GMAIL_USER: ${{ secrets.EMAIL_FROM }}
          GMAIL_PASSWORD: ${{ secrets.EMAIL_PWD }}
          REPORT_EMAIL: ${{ secrets.REPORT_TO }}
        run: |
          python "$GITHUB_WORKSPACE/.github/scripts/scanning/send-report.py"
